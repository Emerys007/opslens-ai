<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="refresh"
      content="0; url=/opslens/install/complete/"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to OpsLens install complete | app-sync.com</title>
    <meta
      name="description"
      content="Legacy install-complete handoff for OpsLens on the app-sync integration hub."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/assets/opslens-mark.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
    <script>
      window.location.replace("/opslens/install/complete/");
    </script>
  </head>
  <body class="success-body">
    <div class="site-shell install-shell">
      <header class="topbar compact-topbar">
        <a class="brand" href="/">
          <img src="/assets/opslens-mark.svg" alt="app-sync integrations" width="34" height="34" />
          <span>
            <strong>app-sync integrations</strong>
            <em>Legacy install route</em>
          </span>
        </a>
        <a class="topbar-link" href="/opslens/install/complete/">Go to OpsLens page</a>
      </header>

      <main class="install-main">
        <section class="success-card redirect-card">
          <p class="eyebrow">Route moved</p>
          <h1>Sending you to the OpsLens install-complete page.</h1>
          <p class="hero-text">
            This legacy route now hands off to the app-specific OpsLens install flow
            on the app-sync integration hub.
          </p>
          <div class="hero-actions centered-actions">
            <a class="button button-primary" href="/opslens/install/complete/">
              Continue to OpsLens install complete
            </a>
            <a class="button button-secondary" href="/opslens/">
              View OpsLens app page
            </a>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
