<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="opslens-mark-title">
  <title id="opslens-mark-title">OpsLens AI mark</title>
  <defs>
    <linearGradient id="opslensTile" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <g transform="scale(0.09375)">
    <!-- Indigo -> violet rounded tile -->
    <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#opslensTile)"/>
    <!-- Magnifying glass handle -->
    <line x1="760" y1="724" x2="916" y2="880" stroke="#FFFFFF" stroke-width="80" stroke-linecap="round"/>
    <!-- Magnifying glass ring -->
    <circle cx="452" cy="416" r="300" stroke="#FFFFFF" stroke-width="60"/>
    <!-- 3x3 grid of CRM record cells; center cell flagged in amber -->
    <rect x="300" y="264" width="76" height="76" rx="14" fill="#FFFFFF"/>
    <rect x="414" y="264" width="76" height="76" rx="14" fill="#FFFFFF"/>
    <rect x="528" y="264" width="76" height="76" rx="14" fill="#FFFFFF"/>
    <rect x="300" y="378" width="76" height="76" rx="14" fill="#FFFFFF"/>
    <rect x="414" y="378" width="76" height="76" rx="14" fill="#FBBF24"/>
    <rect x="528" y="378" width="76" height="76" rx="14" fill="#FFFFFF"/>
    <rect x="300" y="492" width="76" height="76" rx="14" fill="#FFFFFF"/>
    <rect x="414" y="492" width="76" height="76" rx="14" fill="#FFFFFF"/>
    <rect x="528" y="492" width="76" height="76" rx="14" fill="#FFFFFF"/>
  </g>
</svg>
