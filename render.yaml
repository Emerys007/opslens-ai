services:
  - type: web
    name: opslens-public-site
    runtime: static
    plan: free
    branch: main
    buildCommand: echo "Static site ready"
    staticPublishPath: ./public-site
    domains:
      - apps.app-sync.com
    buildFilter:
      paths:
        - public-site/**
        - render.yaml
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: "true"
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /install/complete
        destination: /install/complete/index.html
  - type: cron
    name: opslens-auto-resolve
    runtime: python
    region: ohio
    plan: starter
    branch: main
    buildCommand: echo "No build required for cron curl job v2"
    startCommand: bash scripts/auto_resolve.sh
    schedule: "*/15 * * * *"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: OPSLENS_API_BASE_URL
        value: https://api.app-sync.com
      - key: OPSLENS_AUTO_RESOLVE_QUIET_HOURS
        value: "24"
      - key: OPSLENS_AUTO_RESOLVE_MAX_RECORDS
        value: "200"
      - key: OPSLENS_MAINTENANCE_KEY
        sync: false
